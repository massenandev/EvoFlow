name: evoflow

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: evoflow
      POSTGRES_USER: evoflow
      POSTGRES_PASSWORD: evoflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evoflow -d evoflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 3000
      DATABASE_URL: postgres://evoflow:evoflow@postgres:5432/evoflow
      CORS_ORIGIN: "*"
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
